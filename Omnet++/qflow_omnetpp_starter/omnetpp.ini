[General]
network = src.QFlowNetwork
sim-time-limit = 100000s
repeat = 1
seed-set = ${repetition}

**.controller.fidelityThreshold = 0.90
**.controller.fiberLossDbPerKm = 0.2
**.controller.maxHops = 8
**.controller.maxCandidatePaths = 256
**.controller.alpha1 = 1.0
**.controller.alpha2 = 1.5
**.controller.alpha3 = 0.5
**.controller.alpha4 = 2.0
**.controller.rngSeed = 42

[Config Ring6KeyAwareDebug]
description = "Ring-6 debug run"
**.controller.topologyFile = "topologies/ring6.csv"
**.controller.algorithm = "keyaware"
**.controller.requestRate = 20
**.controller.requestLimit = 100
**.controller.srcNode = 0
**.controller.dstNode = 3
**.controller.outputCsv = "results/ring6_keyaware_debug.csv"

[Config Mesh9SweepDistance]
description = "Mesh-9 distance baseline"
**.controller.topologyFile = "topologies/mesh9.csv"
**.controller.algorithm = "distance"
**.controller.requestRate = 1000
**.controller.requestLimit = 2000
**.controller.srcNode = -1
**.controller.dstNode = -1
**.controller.outputCsv = "results/mesh9_distance.csv"

[Config Mesh9SweepKeyAware]
description = "Mesh-9 key-aware baseline"
**.controller.topologyFile = "topologies/mesh9.csv"
**.controller.algorithm = "keyaware"
**.controller.requestRate = 1000
**.controller.requestLimit = 2000
**.controller.outputCsv = "results/mesh9_keyaware.csv"

[Config Mesh9SweepGaProxy]
description = "Mesh-9 Tcheby proxy"
**.controller.topologyFile = "topologies/mesh9.csv"
**.controller.algorithm = "ga_tcheby_proxy"
**.controller.requestRate = 1000
**.controller.requestLimit = 2000
**.controller.outputCsv = "results/mesh9_ga_tcheby_proxy.csv"

[Config Mesh16LoadSweep]
description = "Mesh-16 load sweep"
**.controller.topologyFile = "topologies/mesh16.csv"
**.controller.algorithm = "keyaware"
**.controller.requestRate = 500
**.controller.requestLimit = 5000
**.controller.outputCsv = "results/mesh16_keyaware.csv"

[Config Irregular12LoadSweep]
description = "Irregular-12 load sweep"
**.controller.topologyFile = "topologies/irregular12.csv"
**.controller.algorithm = "ga_tcheby_proxy"
**.controller.requestRate = 800
**.controller.requestLimit = 5000
**.controller.outputCsv = "results/irregular12_ga_tcheby_proxy.csv"
